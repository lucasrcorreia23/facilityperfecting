project_id = "perfecting-roleplay-generator"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = false

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true

[functions.extract-text]
verify_jwt = true

[functions.list-orgs]
verify_jwt = true

[functions.list-call-contexts]
verify_jwt = true

[functions.process-import]
verify_jwt = true

[functions.export-roleplay]
verify_jwt = true
